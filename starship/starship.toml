"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
format = """
$hostname\
$directory\
$git_branch\
$git_status\
$golang\
$nodejs\
$python\
$jobs\
$status\
$line_break\
$character"""

right_format = """
$docker_context\
$cmd_duration\
$time"""

[character]
success_symbol = "[‚ĚĮ](cyan)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](cyan)"

[hostname]
ssh_only = false
format = "[‚¶ó$hostname‚¶ė](bold cyan) "
disabled = false

[directory]
style = "cyan"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = "Óú• " # nf-oct-git_branch
style = "green"

[git_status]
format = """($all_status$ahead_behind) """
ahead = "[‚á°](blue)"
behind = "[‚á£](red)"
diverged = "[‚áē](purple)"
up_to_date = "[‚úď](green)"
untracked = "[?](bright-purple)"
stashed = "[‚Č°](cyan)"
modified = "[!](yellow)"
staged = "[+](green)"
renamed = "[¬Ľ](blue)"
deleted = "[‚úė](red)"

[docker_context]
format = "[$symbol$context]($style) "
symbol = " "
style = "blue"
only_with_files = false
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[golang]
format = "[$symbol$version]($style) "
symbol = " "
style = "cyan"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum", "glide.yaml", "Gopkg.yml", "Gopkg.lock", ".go-version"]
detect_folders = ["Godeps"]

[nodejs]
format = "[$symbol($version )]($style)"
symbol = "ůįéô " # nf-dev-nodejs_small
style = "green"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc", "tsconfig.json"]
detect_folders = ["node_modules"]
disabled = false

[python]
format = "[$symbol($version )]($style)"
symbol = "ůįĆ† "
style = "yellow"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile", "tox.ini", "setup.py", "__init__.py"]
detect_folders = [".venv", "venv", ".virtualenv"]
disabled = false

[fill]
disabled = true # Removed fill for compactness

[jobs]
format = "[$symbol$number]($style) "
symbol = "‚ú¶ "
style = "yellow"
number_threshold = 1
symbol_threshold = 1

[status]
format = "[$symbol$status]($style) "
symbol = "‚úĖ "
success_symbol = ""
style = "red"
disabled = false

[cmd_duration]
disabled = false
format = "[$duration]($style) "
min_time = 2000
style = "yellow dimmed"

[time]
disabled = false
format = "[$time]($style) "
style = "dimmed"
time_format = "%T"

[custom.nx]
command = '''
dir="$PWD"
while [ "$dir" != "/" ]; do
  if [ -f "$dir/nx.json" ]; then
    echo "nx"
    exit 0
  fi
  dir=$(dirname "$dir")
done
'''
when = '''
dir="$PWD"
while [ "$dir" != "/" ]; do
  [ -f "$dir/nx.json" ] && exit 0
  dir=$(dirname "$dir")
done
exit 1
'''
format = "[$symbol$output]($style) "
symbol = "‚¨Ę "
style = "purple"
description = "Shows Nx workspace name when in monorepo"
disabled = true
